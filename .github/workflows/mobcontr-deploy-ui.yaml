name: Mobile Contract  - Deploy UI

run-name: 'Mobile Contract UI → ${{ github.event.inputs.environment || github.ref_name }} (#${{ github.run_number }})'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - poc
          - test
          - staging
          - prod
        default: poc
      version:
        description: Version tag for the image
        required: true
        default: latest
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      version:
        description: 'Image version tag'
        required: false
        type: string
        default: 'latest'
      skip_acr_access_toggle:
        description: 'Skip ACR public access enable/disable (used when called from deploy-all)'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
  push:
    branches:
      - dev
      - test
      - staging
      - prod
    paths:
      - 'ui/**'
      - '.github/workflows/mobcontr-deploy-ui.yaml'

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
  IMAGE_NAME: mobcontr-ui
  DOCKERFILE_PATH: af_agentcell_004/ui/Dockerfile
  BUILD_CONTEXT: af_agentcell_004/ui
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_TF_RG_NAME }}
  CONTAINER_APP_UI: "ca-uiapp-mobcontr-${{ github.event.inputs.environment || github.ref_name }}-gwc"
  CONTAINER_REGISTRY: "acrmobcontr${{ github.event.inputs.environment || github.ref_name }}.azurecr.io"
  REGISTRY_NAME: "acrmobcontr${{ github.event.inputs.environment || github.ref_name }}"

jobs:
  build-and-deploy:
    # Use GitHub-hosted runner - simpler than self-hosted
    # ACR needs temporary public access for the build anyway (ACR Tasks limitation)
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || github.ref_name }}
    permissions:
      contents: read
      id-token: write # Needed for federated identity login to Azure

    steps:
      - name: Checkout actuals repo
        uses: actions/checkout@v4
        with:
          path: af_agentcell_004

      - name: Set version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "latest" ]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
            echo "Using manual version: ${VERSION_TAG}"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION_TAG="$(date +%Y.%m.%d)-${SHORT_SHA}-${{ github.run_id }}"
            echo "Generated version: ${VERSION_TAG}"
          fi
          echo "VERSION=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Export ARM credentials for Terraform
        shell: bash
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          echo "ARM_CLIENT_ID=${ARM_CLIENT_ID}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${ARM_TENANT_ID}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${ARM_SUBSCRIPTION_ID}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=${ARM_USE_OIDC}" >> $GITHUB_ENV
          echo "ARM_USE_AZUREAD=true" >> $GITHUB_ENV
          echo "✅ Azure ARM environment variables configured for OIDC authentication"

      - name: Set Azure Subscription
        run: |
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
          az account show

      - name: Validate Azure Targets
        run: |
          set -e
          echo "AZURE_SUBSCRIPTION_ID=${{ env.AZURE_SUBSCRIPTION_ID }}"
          echo "AZURE_RESOURCE_GROUP=${{ env.AZURE_RESOURCE_GROUP }}"
          echo "CONTAINER_APP_UI=${{ env.CONTAINER_APP_UI }}"
          echo "CONTAINER_REGISTRY=${{ env.CONTAINER_REGISTRY }}"
          if [ -z "${{ env.CONTAINER_APP_UI }}" ]; then echo "Missing CONTAINER_APP_UI"; exit 1; fi
          if [ -z "${{ env.AZURE_RESOURCE_GROUP }}" ]; then echo "Missing AZURE_RESOURCE_GROUP"; exit 1; fi
          az group show -n "${{ env.AZURE_RESOURCE_GROUP }}" 1>/dev/null
          echo "Validating container app exists..."
          az containerapp show \
            --name "${{ env.CONTAINER_APP_UI }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" -o table

      - name: Fetch Environment Variables from Azure
        id: fetch_env
        run: |
          set -e
          echo "Fetching environment variables from deployed Container App..."

          ENV_VARS=$(az containerapp show \
            --name "${{ env.CONTAINER_APP_UI }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query 'properties.template.containers[0].env' -o json)

          CLIENT_ID=$(echo "$ENV_VARS" | jq -r '.[] | select(.name=="NEXT_PUBLIC_AZURE_CLIENT_ID") | .value')
          TENANT_ID=$(echo "$ENV_VARS" | jq -r '.[] | select(.name=="NEXT_PUBLIC_AZURE_TENANT_ID") | .value')
          REDIRECT_URI=$(echo "$ENV_VARS" | jq -r '.[] | select(.name=="NEXT_PUBLIC_AZURE_REDIRECT_URI") | .value')
          API_SCOPE=$(echo "$ENV_VARS" | jq -r '.[] | select(.name=="NEXT_PUBLIC_AZURE_API_SCOPE") | .value')
          API_URL=$(echo "$ENV_VARS" | jq -r '.[] | select(.name=="NEXT_PUBLIC_API_URL") | .value')
          WS_URL=$(echo "$ENV_VARS" | jq -r '.[] | select(.name=="NEXT_PUBLIC_WS_URL") | .value')

          if [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "null" ]; then
            echo "❌ Failed to fetch NEXT_PUBLIC_AZURE_CLIENT_ID from Container App"
            exit 1
          fi
          if [ -z "$TENANT_ID" ] || [ "$TENANT_ID" = "null" ]; then
            echo "❌ Failed to fetch NEXT_PUBLIC_AZURE_TENANT_ID from Container App"
            exit 1
          fi
          if [ -z "$API_SCOPE" ] || [ "$API_SCOPE" = "null" ]; then
            echo "❌ Failed to fetch NEXT_PUBLIC_AZURE_API_SCOPE from Container App"
            exit 1
          fi

          echo "CLIENT_ID=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "TENANT_ID=$TENANT_ID" >> $GITHUB_OUTPUT
          echo "REDIRECT_URI=$REDIRECT_URI" >> $GITHUB_OUTPUT
          echo "API_SCOPE=$API_SCOPE" >> $GITHUB_OUTPUT
          echo "API_URL=$API_URL" >> $GITHUB_OUTPUT
          echo "WS_URL=$WS_URL" >> $GITHUB_OUTPUT

      - name: Temporarily Enable ACR Public Access
        if: ${{ inputs.skip_acr_access_toggle != true }}
        run: |
          # ACR Tasks runs on Microsoft-hosted agents with public IPs
          # We need to temporarily enable public access for the build
          echo "Temporarily enabling public access for ACR build..."

          # Enable public network access and set default action to Allow
          az acr update \
            --name "${{ env.REGISTRY_NAME }}" \
            --public-network-enabled true \
            --default-action Allow

          # Wait and verify the change took effect
          echo "Waiting for ACR configuration to propagate..."
          for i in {1..12}; do
            sleep 10
            STATUS=$(az acr show --name "${{ env.REGISTRY_NAME }}" --query "publicNetworkAccess" -o tsv)
            echo "Attempt $i: Public network access = $STATUS"
            if [ "$STATUS" == "Enabled" ]; then
              echo "✅ Public access confirmed enabled"
              break
            fi
          done

          # Extra buffer for DNS/network propagation
          sleep 15

      - name: Unlock Latest Tag (if exists)
        continue-on-error: true
        run: |
          az acr repository update \
            --name "${{ env.REGISTRY_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --write-enabled true \
            --delete-enabled true 2>/dev/null || echo "No existing latest tag to unlock"

      - name: Build and Push Image with ACR Tasks
        id: build
        run: |
          # Use ACR Tasks to build the image
          echo "Building image using ACR Tasks..."
          echo "  Registry: ${{ env.REGISTRY_NAME }}"
          echo "  Image: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}"

          az acr build \
            --registry "${{ env.REGISTRY_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --build-arg NEXT_PUBLIC_AZURE_CLIENT_ID="${{ steps.fetch_env.outputs.CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_AZURE_TENANT_ID="${{ steps.fetch_env.outputs.TENANT_ID }}" \
            --build-arg NEXT_PUBLIC_AZURE_REDIRECT_URI="${{ steps.fetch_env.outputs.REDIRECT_URI }}" \
            --build-arg NEXT_PUBLIC_AZURE_API_SCOPE="${{ steps.fetch_env.outputs.API_SCOPE }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.fetch_env.outputs.API_URL }}" \
            --build-arg NEXT_PUBLIC_WS_URL="${{ steps.fetch_env.outputs.WS_URL }}" \
            --file "${{ env.DOCKERFILE_PATH }}" \
            "${{ env.BUILD_CONTEXT }}"

          echo "✅ Image built and pushed successfully"

      - name: Disable ACR Public Access
        if: ${{ always() && inputs.skip_acr_access_toggle != true }}
        run: |
          # Always disable public access, even if build failed
          echo "Disabling ACR public access..."
          az acr update \
            --name "${{ env.REGISTRY_NAME }}" \
            --public-network-enabled false \
            --default-action Deny
          echo "✅ ACR public access disabled"

      - name: Lock Version Tag (Make Immutable)
        run: |
          az acr repository update \
            --name "${{ env.REGISTRY_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}" \
            --write-enabled false \
            --delete-enabled false

      - name: Lock Latest Tag
        run: |
          az acr repository update \
            --name "${{ env.REGISTRY_NAME }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --write-enabled false \
            --delete-enabled false

      # Registry is configured by Terraform with user-assigned identity - no manual step needed
      - name: Update Container App with New Image
        run: |
          az containerapp revision copy \
            --name "${{ env.CONTAINER_APP_UI }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}"

      - name: Deployment Summary
        run: |
          echo "### Deployment Summary (Mobile Contract UI)" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Mobile Contract" >> $GITHUB_STEP_SUMMARY
          echo "- Subscription: ${{ env.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Resource Group: ${{ env.AZURE_RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- Container App: ${{ env.CONTAINER_APP_UI }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
