# ============================================================================
# EXECUTOR CONFIGURATION
# ============================================================================

executor:
  type: "phased_orchestration"
  streaming: true

  agents:
    - name: "main_agent"
      model:
        name: "${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4o-deployment}"
        type: "chat"
        max_tokens: 4096
        temperature: 0.0

      system_prompt: |
        You are a Mobile Contract data processing agent.
        Your task is to extract data from invoice PDFs, load employee data, and generate analysis reports in a structured multi-phase process.
        Follow the instructions for each phase carefully and use the specified tools to complete your tasks.

      tools:
        - "invoice_pdf_to_tables"
        - "load_databricks_employee_data"
        - "generate_mobile_contract_reports"
        # Phase communication tools
        - "store_phase_result"
        - "get_phase_result"
        - "get_all_phase_results"
        # File handling tools
        - "download_file_from_url"
        - "read_file"

      # MCP tools - Load all tools from configured MCP servers
      # mcp_tools:
      #   - "mcp://email-mcp"  # All Email tools
      #   - "mcp://sharepoint-mcp"  # All SharePoint tools

  phases:
    - name: "Data Extraction Phase"
      agent: "main_agent"
      number: 1
      instructions: |
        **Objective:** Call `invoice_pdf_to_tables` once with all provided PDF paths, plus the vendor and country the user selected in the UI.

        **Step 1 — Extract metadata from the user message:**
        - Look for a line that starts with `Vendor/Carrier:` → extract the vendor name (e.g. "vivo", "att", "verizon"). If missing or "Unknown", pass `vendor=null`.
        - Look for a line that starts with `Country:` → extract the country name (e.g. "Brazil", "United States"). If missing or "Unknown", pass `country=null`.
        - Look for a line that starts with `Max pages per PDF:` → extract the integer value (e.g. 40, -1). If missing, pass `max_pages=null`. A value of -1 means process all pages.

        **Step 2 — Collect PDF paths:**
        Build `pdf_paths` from:
          - Lines matching `- <path>` under `PDF files:` in the user text
          - Attachment `uri` values ending with `.pdf`
        Ignore `.csv` files in this phase.

        **Step 3 — Make exactly ONE tool call:**
        ```
        invoice_pdf_to_tables(
            file_paths=<pdf_paths>,
            vendor=<vendor extracted in step 1, or null>,
            country=<country extracted in step 1, or null>,
            max_pages=<max_pages extracted in step 1, or null>
        )
        ```
        Do NOT call `invoice_pdf_to_tables` more than once in this phase.

        **Completion:**
        - On success, output JSON and `---PHASE_COMPLETE---`.
        - On failure, output `---PHASE_FAILED: <reason>---`.

        **Required Output JSON:**
        {
          "extraction_complete": true,
          "total_pdfs_processed": <number>,
          "total_records": <number>,
          "pdf_filenames": [<string>],
          "sqlite_tables": [<string>],
          "output_files": [<string>],
          "errors": [<string>]
        }

      phase_output:
        type: "object"
        required: ["extraction_complete", "total_pdfs_processed", "total_records", "pdf_filenames", "sqlite_tables"]
        properties:
          extraction_complete:
            type: "boolean"
            description: "Whether at least one PDF was extracted successfully"
          total_pdfs_processed:
            type: "integer"
            description: "Number of PDF files processed in this phase (expected: 1)"
          total_records:
            type: "integer"
            description: "Total number of MSISDN records extracted"
          pdf_filenames:
            type: "array"
            items:
              type: "string"
            description: "List of processed PDF filenames (typically one item)"
          sqlite_tables:
            type: "array"
            items:
              type: "string"
            description: "List of SQLite table names created (typically one item)"
          output_files:
            type: "array"
            items:
              type: "string"
            description: "List of CSV file paths generated (typically one item)"
          errors:
            type: "array"
            items:
              type: "string"
            description: "List of any errors encountered during processing"

    - name: "Employee Data Loading Phase"
      agent: "main_agent"
      number: 2
      instructions: |
        **Objective:** Load employee wireless data from Databricks into the SQLite table `Employee_data`.

        **Prerequisites:**
        - Phase 1 must have completed successfully (invoice data from one or more PDFs already in SQLite)

        **STEP 1:** Call `load_databricks_employee_data`:
        ```
        load_databricks_employee_data()
        ```
        Optionally pass `country_filter` if the user specified a country in their message.

        **STEP 2:** Verify the tool response: success == true, employee_records > 0.

        **STEP 3:** Output structured JSON:
          - mapping_complete: true
          - employee_records: <count>
          - employee_table: "Employee_data"
          - data_source: "databricks"

        **STEP 4:** Output ---PHASE_COMPLETE---

        If any step fails, output ---PHASE_FAILED: [specific error]---

        **Important Notes:**
        - Employee data is always loaded from Databricks (DATABRICKS_TOKEN env var must be configured)
        - Phone numbers are automatically normalized during loading
        - After completion, SQLite contains: N invoice tables + 1 Employee_data table

      phase_output:
        type: "object"
        required: ["mapping_complete", "employee_records", "employee_table", "data_source"]
        properties:
          data_source:
            type: "string"
            enum: ["databricks"]
            description: "Where the employee data came from — always 'databricks'"
          mapping_complete:
            type: "boolean"
            description: "Whether employee data loading completed successfully"
          employee_records:
            type: "integer"
            description: "Number of employee records loaded"
          employee_table:
            type: "string"
            description: "Name of employee data table in SQLite"

    - name: "Report Generation Phase"
      agent: "main_agent"
      number: 3
      instructions: |
        **Objective:** Generate comprehensive analysis reports from invoice and employee data.

        **Prerequisites:**
        - Phase 1 and Phase 2 must have completed successfully
        - Both invoice tables (one or more from Phase 1) and Employee_data table exist in SQLite

        **Steps:**
        1. Verify Phase 1 completed using get_phase_result(1):
           - Check that extraction_complete is true
           - Confirm invoice data was loaded
        2. Verify Phase 2 completed using get_phase_result(2):
           - Check that mapping_complete is true
           - Confirm employee data was loaded
        3. Call generate_mobile_contract_reports tool with the country and vendor the user selected in the UI
           - Pass exactly the same country and vendor values used when calling invoice_pdf_to_tables in Phase 1
           - Example: generate_mobile_contract_reports(country="Germany", vendor="telekom")
           - If country is unknown or was not specified, omit the parameter (defaults to US normalisation)
           - If vendor is unknown or was not specified, omit the parameter
        4. The tool will:
           - Automatically find ALL invoice tables in SQLite (from all PDFs in Phase 1)
           - Consolidate data from all invoice tables for comprehensive analysis
           - Analyze both invoice and employee tables in SQLite
           - Detect zero usage users across all invoices
           - Find invoice-only users (not in employee records)
           - Identify fraud cases (inactive employees with usage)
           - Detect employee-only users (not in any invoice)
           - Calculate cost savings opportunities
           - Generate Excel report with multiple sheets
           - Save JSON summary with savings calculations
        5. Check the tool response:
           - Verify success is true
           - Extract total_issues count
           - Extract monthly_savings and annual_savings
           - Get breakdown by category (zero_usage, invoice_only, fraud_cases)
        6. If successful, output structured JSON with:
           - reports_generated: true
           - total_issues: <count from tool>
           - monthly_savings: <amount from tool>
           - annual_savings: <amount from tool>
           - categories: <breakdown from tool>
           - output_dir: <directory from tool>
           - excel_file: <filename from tool>
        7. Output ---PHASE_COMPLETE---
        8. If any step fails, output ---PHASE_FAILED: [specific error]---

        **Important Notes:**
        - This phase requires both Phase 1 and Phase 2 data to be in SQLite
        - The tool automatically consolidates ALL invoice tables (if multiple PDFs were processed)
        - Analysis covers all months/invoices from Phase 1
        - Reports are saved to 'output/' directory
        - Excel file contains multiple sheets (Zero Usage, Invoice Only, Fraud Cases, Employee Only)
        - JSON summary file contains detailed savings calculations

      phase_output:
        type: "object"
        required: ["reports_generated", "total_issues", "monthly_savings", "annual_savings"]
        properties:
          reports_generated:
            type: "boolean"
            description: "Whether reports were successfully generated"
          total_issues:
            type: "integer"
            description: "Total number of optimization opportunities found"
          monthly_savings:
            type: "number"
            description: "Estimated monthly savings in dollars"
          annual_savings:
            type: "number"
            description: "Estimated annual savings in dollars"
          total_cost:
            type: "number"
            description: "Total monthly cost of identified issues"
          categories:
            type: "object"
            description: "Breakdown by category (zero_usage, invoice_only, fraud_cases)"
          output_dir:
            type: "string"
            description: "Directory where reports were saved"
          excel_file:
            type: "string"
            description: "Name of generated Excel report file"

