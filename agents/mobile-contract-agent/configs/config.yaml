# MobileContractAgent Configuration

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

logging:
  level: "INFO"

# ============================================================================
# GATEWAY CONFIGURATIONS
# ============================================================================

# LLM Gateway Configuration - Azure OpenAI
llm:
  provider: "azure_openai"

  config:
    endpoint: "${AZURE_OPENAI_ENDPOINT}"
    deployment_name: "${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4o-deployment}"
    api_version: "${AZURE_OPENAI_API_VERSION:2025-01-01-preview}"
    use_managed_identity: false
    api_key: "${AZURE_OPENAI_API_KEY}"
    timeout: 600

  caching:
    enabled: true
    ttl: 3600
    backend: "memory"

  rate_limiting:
    enabled: true
    requests_per_minute: 60
    backend: "memory"

  logging:
    enabled: true
    level: "INFO"
    log_requests: true
    log_responses: true

  max_retries: 3

# ============================================================================
# OBSERVABILITY GATEWAY CONFIGURATION
# ============================================================================

