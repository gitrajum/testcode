    #   agent: "main_agent"
    #   number: 4
    #   instructions: |
    #     **Objective:** Send simple success notification email.

    #     **Steps:**
    #     1. Verify Phase 3 completed using get_phase_result(3)
    #     2. If Phase 3 is not complete, output ---PHASE_FAILED: Previous phase did not complete---
